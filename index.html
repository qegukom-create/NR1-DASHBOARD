<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Global Restitution</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #fbbf24; --accent: #8b5cf6; --text: #f8fafc; --border: #334155; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: var(--primary); text-transform: uppercase; margin: 0; letter-spacing: 2px; font-size: 1.5rem; }

        .controls { display: flex; gap: 20px; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); align-items: center; }
        select, input { background: #0f172a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; }
        select { min-width: 220px; cursor: pointer; }
        input { flex: 1; }

        .view-section { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 20px; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--primary); padding: 15px; border-bottom: 2px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }
        
        .power-text { color: #10b981; font-weight: bold; }
        .points-text { color: #34d399; font-weight: bold; font-size: 0.95rem; }
        .tag { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: inline-block; }
        .tag-ok { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .tag-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); margin: 2px; }
        .no-data { opacity: 0.4; font-style: italic; }

        /* Style des boutons d'envoi de messages */
        .btn-msg { border: none; padding: 3px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-left: 5px; display: inline-flex; align-items: center; gap: 3px; }
        .btn-msg-not-sent { background: #334155; color: #94a3b8; border: 1px solid #475569; }
        .btn-msg-not-sent:hover { background: #475569; color: white; }
        .btn-msg-sent { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }
        .btn-msg-sent:hover { background: rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 NR1 Alliance Global Restitution</h1>
        <div style="color: #64748b; font-size: 0.85rem;" id="sync-status">Syncing...</div>
    </div>

    <div class="controls">
        <div>
            <label style="font-size: 0.7rem; color: var(--primary); display: block; margin-bottom: 5px;">FILTER EVENT</label>
            <select id="eventSelect" onchange="renderTable()">
                <option value="beartrap" selected>🐻 Bear Trap Data (Detailed)</option>
                <option value="swordland">⚔️ Swordland Data (Experience)</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label style="font-size: 0.7rem; color: var(--primary); display: block; margin-bottom: 5px;">SEARCH PLAYER</label>
            <input type="text" id="searchInput" placeholder="Type a name to filter..." onkeyup="filterTable()">
        </div>
    </div>

    <div class="view-section">
        <table id="dataTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <button onclick="cleanBearTrapDatabase()" style="background: #ef4444; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase;">
            🗑️ Clear Bear Trap
        </button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU",
        authDomain: "nr1-vikings.firebaseapp.com",
        databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nr1-vikings"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let masterData = {};

    function loadData() {
        db.ref().on('value', snap => {
            masterData = snap.val() || {};
            renderTable();
            document.getElementById('sync-status').innerText = "Live Synchronized";
        });
    }

    function formatDisplayDate(dateStr) {
        if(!dateStr) return "";
        if(dateStr.includes('-W')) {
            return dateStr.replace('-W', ' / W');
        }
        const parts = dateStr.split('-');
        if(parts.length < 3) return dateStr;
        return `${parts[2]}/${parts[1]}`;
    }

    function toggleMessageStatus(playerId, dateKey, currentStatus) {
        const nextStatus = !currentStatus;
        db.ref(`beartrap/reports/${playerId}/${dateKey}/messageSent`).set(nextStatus);
    }

    function renderTable() {
        const currentEvent = document.getElementById('eventSelect').value;
        const players = masterData.alliance_database || {};
        
        const header = document.getElementById('tableHeader');
        const body = document.getElementById('tableBody');
        
        body.innerHTML = "";

        let uniqueDates = new Set();
        if (currentEvent === 'beartrap' && masterData.beartrap?.reports) {
            Object.keys(masterData.beartrap.reports).forEach(pId => {
                Object.keys(masterData.beartrap.reports[pId]).forEach(dateKey => {
                    uniqueDates.add(dateKey);
                });
            });
        } else if (currentEvent === 'swordland' && masterData.experience_reports) {
            Object.keys(masterData.experience_reports).forEach(pId => {
                Object.keys(masterData.experience_reports[pId]).forEach(weekKey => {
                    uniqueDates.add(weekKey);
                });
            });
        }
        const last4Dates = Array.from(uniqueDates).sort((a, b) => b.localeCompare(a)).slice(0, 4);

        let dateHeadersHtml = "";
        for (let i = 0; i < 4; i++) {
            if (last4Dates[i]) {
                dateHeadersHtml += `<th>${currentEvent === 'swordland' ? 'Week' : 'Report'} ${formatDisplayDate(last4Dates[i])}</th>`;
            } else {
                dateHeadersHtml += `<th>No Data Yet</th>`;
            }
        }

        header.innerHTML = `
            <tr>
                <th>Player Name</th>
                <th>Current Power</th>
                ${dateHeadersHtml}
            </tr>`;

        const sortedPlayerIds = Object.keys(players).map(id => {
            let totalErrorsLast4Days = 0; 
            let totalPointsLast4Weeks = 0;
            let historyByDate = {};

            if (currentEvent === 'beartrap') {
                const bData = masterData.beartrap?.reports?.[id] || {};
                last4Dates.forEach(dateKey => {
                    const dayReport = bData[dateKey];
                    if (dayReport && dayReport.errors && dayReport.errors.length > 0) {
                        historyByDate[dateKey] = {
                            errors: dayReport.errors,
                            trap: dayReport.trap,
                            messageSent: dayReport.messageSent || false // Récupération du statut du message
                        };
                        totalErrorsLast4Days += dayReport.errors.length;
                    } else {
                        historyByDate[dateKey] = null;
                    }
                });
            } else if (currentEvent === 'swordland') {
                const sData = masterData.experience_reports?.[id] || {};
                last4Dates.forEach(weekKey => {
                    const weekReport = sData[weekKey];
                    if (weekReport) {
                        historyByDate[weekKey] = {
                            present: weekReport.present !== undefined ? weekReport.present : true,
                            score: parseInt(weekReport.score) || 0
                        };
                        if (weekReport.present && weekReport.score > 0) {
                            totalPointsLast4Weeks += parseInt(weekReport.score) || 0;
                        }
                    } else {
                        historyByDate[weekKey] = null;
                    }
                });
            }

            return {
                id: id,
                name: players[id].name,
                power: players[id].power || 0,
                totalErrors: totalErrorsLast4Days, 
                totalPoints: totalPointsLast4Weeks,
                historyByDate: historyByDate
            };
        });

        if (currentEvent === 'beartrap') {
            sortedPlayerIds.sort((a, b) => {
                if (b.totalErrors !== a.totalErrors) {
                    return b.totalErrors - a.totalErrors;
                }
                return b.power - a.power; 
            });
        } else if (currentEvent === 'swordland') {
            sortedPlayerIds.sort((a, b) => {
                if (b.totalPoints !== a.totalPoints) {
                    return b.totalPoints - a.totalPoints;
                }
                return b.power - a.power; 
            });
        }

        sortedPlayerIds.forEach(playerObj => {
            const id = playerObj.id;
            const p = players[id];
            let rowHtml = `<td><b>${p.name}</b></td><td class="power-text">${p.power}M</td>`;

            for (let i = 0; i < 4; i++) {
                const targetDate = last4Dates[i];
                
                if (!targetDate) {
                    rowHtml += `<td><span class="no-data">-</span></td>`;
                } else {
                    const dayData = playerObj.historyByDate[targetDate];
                    
                    if (currentEvent === 'beartrap') {
                        if (!dayData) {
                            rowHtml += `<td><span class="tag tag-ok">🟢 Clean</span></td>`;
                        } else {
                            const labelTrap = dayData.trap === 'Trap 1' ? 'T1' : 'T2';
                            const tagsHtml = dayData.errors.map(err => `<span class="tag tag-danger" style="font-size:0.65rem; padding: 2px 4px;">${err}</span>`).join(' ');
                            
                            // Logique de classe CSS et icône du bouton Message
                            const msgClass = dayData.messageSent ? 'btn-msg-sent' : 'btn-msg-not-sent';
                            const msgText = dayData.messageSent ? '✅ Sent' : '✉️ Remind';

                            rowHtml += `<td>
                                <div style="margin-bottom:5px; display:flex; align-items:center;">
                                    <span class="tag tag-danger" style="background: #ef4444; color: white; margin:0;">⚠️ ${labelTrap} (${dayData.errors.length})</span>
                                    <button class="btn-msg ${msgClass}" onclick="toggleMessageStatus('${id}', '${targetDate}', ${dayData.messageSent})">
                                        ${msgText}
                                    </button>
                                </div>
                                <div>${tagsHtml}</div>
                            </td>`;
                        }
                    } 
                    else if (currentEvent === 'swordland') {
                        if (!dayData) {
                            rowHtml += `<td><span class="no-data">Not evaluated</span></td>`;
                        } else if (!dayData.present) {
                            rowHtml += `<td><span class="tag tag-danger">❌ Absent</span></td>`;
                        } else {
                            rowHtml += `<td>
                                <div style="margin-bottom:2px;"><span class="tag tag-ok">✅ Present</span></div>
                                <div class="points-text">${dayData.score.toLocaleString()} pts</div>
                            </td>`;
                        }
                    }
                }
            }

            body.innerHTML += `<tr>${rowHtml}</tr>`;
        });
        
        filterTable();
    }

    function filterTable() {
        const input = document.getElementById("searchInput").value.toUpperCase();
        const rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let nameCell = rows[i].getElementsByTagName("td")[0];
            if (nameCell) {
                rows[i].style.display = nameCell.innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    loadData();
    
    function cleanBearTrapDatabase() {
        if (!confirm("ATTENTION : Cela va supprimer définitivement TOUT l'historique des rapports Bear Trap. Les autres données (Swordland, membres, etc.) ne seront pas touchées. Voulez-vous continuer ?")) return;
        
        db.ref('beartrap/reports').remove()
            .then(() => { 
                alert("La base de données Bear Trap a été nettoyée avec succès !"); 
            })
            .catch((error) => { 
                alert("Erreur lors du nettoyage : " + error.message); 
            });
    }
</script>
</body>
</html>
