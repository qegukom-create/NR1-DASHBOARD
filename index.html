<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Global Restitution</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #fbbf24; --accent: #8b5cf6; --text: #f8fafc; --border: #334155; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: var(--primary); text-transform: uppercase; margin: 0; letter-spacing: 2px; font-size: 1.5rem; }

        .controls { display: flex; gap: 20px; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); align-items: center; }
        select, input { background: #0f172a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; }
        select { min-width: 220px; cursor: pointer; }
        input { flex: 1; }

        .view-section { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 20px; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--primary); padding: 15px; border-bottom: 2px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }
        
        .power-text { color: #10b981; font-weight: bold; }
        .tag { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: inline-block; }
        .tag-ok { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .tag-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); margin: 2px; }
        .no-data { opacity: 0.4; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 NR1 Alliance Global Restitution</h1>
        <div style="color: #64748b; font-size: 0.85rem;" id="sync-status">Syncing...</div>
    </div>

    <div class="controls">
        <div>
            <label style="font-size: 0.7rem; color: var(--primary); display: block; margin-bottom: 5px;">FILTER EVENT</label>
            <select id="eventSelect" onchange="renderTable()">
                <option value="swordland">⚔️ Swordland Data</option>
                <option value="beartrap">🐻 Bear Trap Data (Detailed)</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label style="font-size: 0.7rem; color: var(--primary); display: block; margin-bottom: 5px;">SEARCH PLAYER</label>
            <input type="text" id="searchInput" placeholder="Type a name to filter..." onkeyup="filterTable()">
        </div>
    </div>

    <div class="view-section">
        <table id="dataTable">
            <thead id="tableHeader">
                </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU",
        authDomain: "nr1-vikings.firebaseapp.com",
        databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nr1-vikings"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let masterData = {};

    function loadData() {
        db.ref().on('value', snap => {
            masterData = snap.val() || {};
            renderTable();
            document.getElementById('sync-status').innerText = "Live Synchronized";
        });
    }

    function renderTable() {
        const currentEvent = document.getElementById('eventSelect').value;
        const players = masterData.alliance_database || {};
        
        const header = document.getElementById('tableHeader');
        const body = document.getElementById('tableBody');
        
        body.innerHTML = "";

        // 1. ADAPTATION DE L'ENTÊTE (Ajout des deux colonnes pour le Bear Trap)
        if (currentEvent === 'swordland') {
            header.innerHTML = `
                <tr>
                    <th>Player Name</th>
                    <th>Current Power</th>
                    <th>Presence Status</th>
                    <th>Points Scored</th>
                </tr>`;
        } else if (currentEvent === 'beartrap') {
            header.innerHTML = `
                <tr>
                    <th>Player Name</th>
                    <th>Current Power</th>
                    <th>Trap 1 Misplays</th>
                    <th>Trap 2 Misplays</th>
                </tr>`;
        }

        // Compilation et préparation des données pour le tri
        const sortedPlayerIds = Object.keys(players).map(id => {
            let t1Errors = [];
            let t2Errors = [];
            
            if (currentEvent === 'beartrap') {
                const bData = masterData.beartrap?.reports?.[id] || {};
                Object.keys(bData).forEach(key => {
                    const report = bData[key];
                    if (report.errors) {
                        // Tri sélectif selon la valeur du piège ("Trap 1" ou "Trap 2")
                        if (report.trap === 'Trap 1') {
                            t1Errors = t1Errors.concat(report.errors);
                        } else if (report.trap === 'Trap 2') {
                            t2Errors = t2Errors.concat(report.errors);
                        }
                    }
                });
            }

            return {
                id: id,
                name: players[id].name,
                power: players[id].power || 0,
                t1Count: t1Errors.length,
                t2Count: t2Errors.length,
                totalErrors: t1Errors.length + t2Errors.length,
                t1Details: t1Errors,
                t2Details: t2Errors
            };
        });

        // 2. LOGIQUE DE TRI DYNAMIQUE
        if (currentEvent === 'swordland') {
            sortedPlayerIds.sort((a, b) => b.power - a.power);
        } else if (currentEvent === 'beartrap') {
            // Tri par le TOTAL des erreurs des deux pièges combinés (les pires en haut)
            sortedPlayerIds.sort((a, b) => {
                if (b.totalErrors !== a.totalErrors) {
                    return b.totalErrors - a.totalErrors;
                }
                return b.power - a.power;
            });
        }

        // 3. INJECTION DES DONNÉES DANS LE TABLEAU
        sortedPlayerIds.forEach(playerObj => {
            const id = playerObj.id;
            const p = players[id];
            let rowHtml = `<td><b>${p.name}</b></td><td class="power-text">${p.power}M</td>`;

            if (currentEvent === 'swordland') {
                const sData = masterData.swordland?.reports?.[id] || { points: 0, present: false };
                rowHtml += `
                    <td>${sData.present ? '<span class="tag tag-ok">✅ Present</span>' : '<span class="tag tag-danger">❌ Absent</span>'}</td>
                    <td><b>${sData.present ? sData.points.toLocaleString() : '-'}</b></td>`;
            } 
            
            else if (currentEvent === 'beartrap') {
                // Remplissage Colonne TRAP 1
                if (playerObj.t1Count === 0) {
                    rowHtml += `<td><span class="tag tag-ok">🟢 Clean</span></td>`;
                } else {
                    const tagsT1 = playerObj.t1Details.map(err => `<span class="tag tag-danger" style="font-size:0.7rem;">${err}</span>`).join(' ');
                    rowHtml += `<td><div style="margin-bottom:4px;"><span class="tag tag-danger">⚠️ ${playerObj.t1Count} Error(s)</span></div>${tagsT1}</td>`;
                }

                // Remplissage Colonne TRAP 2
                if (playerObj.t2Count === 0) {
                    rowHtml += `<td><span class="tag tag-ok">🟢 Clean</span></td>`;
                } else {
                    const tagsT2 = playerObj.t2Details.map(err => `<span class="tag tag-danger" style="font-size:0.7rem;">${err}</span>`).join(' ');
                    rowHtml += `<td><div style="margin-bottom:4px;"><span class="tag tag-danger">⚠️ ${playerObj.t2Count} Error(s)</span></div>${tagsT2}</td>`;
                }
            }

            body.innerHTML += `<tr>${rowHtml}</tr>`;
        });
        
        filterTable();
    }

    function filterTable() {
        const input = document.getElementById("searchInput").value.toUpperCase();
        const rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let nameCell = rows[i].getElementsByTagName("td")[0];
            if (nameCell) {
                rows[i].style.display = nameCell.innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    loadData();
</script>
</body>
</html>
