<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Global Player Analytics</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #fbbf24; --accent: #8b5cf6; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: var(--primary); text-transform: uppercase; margin: 0; letter-spacing: 2px; }

        /* Search & Filters */
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        input { background: var(--card); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; flex: 1; outline: none; }

        /* Table Style */
        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(251, 191, 36, 0.1); color: var(--primary); padding: 15px; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; }
        th:hover { background: rgba(251, 191, 36, 0.2); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover { background: rgba(255,255,255,0.05); }

        /* Dynamic Tags */
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-right: 5px; }
        .tag-sword { background: var(--accent); color: white; }
        .tag-bear { background: #ef4444; color: white; }
        .power-text { color: #10b981; font-weight: bold; }
        
        .empty { padding: 40px; text-align: center; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 Global Analytics</h1>
        <div id="last-update" style="font-size: 0.8rem; color: #64748b;">Syncing with Firebase...</div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search player name..." onkeyup="filterTable()">
    </div>

    <div class="table-container">
        <table id="analyticsTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">Player Name</th>
                    <th onclick="sortTable(1)">Power</th>
                    <th onclick="sortTable(2)">Swordland Pts</th>
                    <th onclick="sortTable(3)">Bear Trap Pts</th>
                    <th onclick="sortTable(4)">Participation</th>
                    <th id="future-header">Future Stats</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU",
        authDomain: "nr1-vikings.firebaseapp.com",
        databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nr1-vikings"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function fetchGlobalData() {
        // On récupère tout en une seule fois pour croiser les données
        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const players = data.alliance_database || {};
            const swordReports = data.swordland?.reports || {};
            const bearReports = data.beartrap?.reports || {}; // Prévu pour ta prochaine page
            
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = "";

            // Transformation en tableau d'objets pour manipulation facile
            const masterList = Object.keys(players).map(id => {
                const p = players[id];
                const sword = swordReports[id] || { points: 0, present: false };
                const bear = bearReports[id] || { points: 0, present: false };

                return {
                    name: p.name,
                    power: p.power || 0,
                    swordPts: sword.points || 0,
                    bearPts: bear.points || 0,
                    attendance: (sword.present ? 1 : 0) + (bear.present ? 1 : 0),
                    // Ici on pourra ajouter n'importe quelle future branche
                    raw: data // On garde l'accès au reste si besoin
                };
            });

            // Tri par puissance par défaut
            masterList.sort((a,b) => b.power - a.power);

            masterList.forEach(m => {
                const row = `<tr>
                    <td><b>${m.name}</b></td>
                    <td class="power-text">${m.power}M</td>
                    <td>${m.swordPts.toLocaleString()}</td>
                    <td>${m.bearPts.toLocaleString()}</td>
                    <td>
                        ${m.attendance > 0 ? `<span class="tag tag-sword">${m.attendance} Event(s)</span>` : '<span style="opacity:0.3">-</span>'}
                    </td>
                    <td style="color:#64748b">...</td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            document.getElementById('last-update').innerText = "Last sync: " + new Date().toLocaleTimeString();
        });
    }

    // Fonctions utilitaires : Recherche et Tri
    function filterTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let name = rows[i].getElementsByTagName("td")[0];
            if (name) {
                rows[i].style.display = name.innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    function sortTable(n) {
        // Logique de tri simplifiée pour l'exemple
        console.log("Sorting by column " + n);
    }

    fetchGlobalData();
</script>
</body>
</html>
